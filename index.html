<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>門市管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 50px; }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        .card { margin-top: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">🏠 門市作業系統</h2>
    
    <ul class="nav nav-pills nav-fill mb-3" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab1">布本借用</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab2">來客數</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab3">問題回報</button></li>
    </ul>

    <div class="tab-content" id="pills-tabContent">
        <div class="tab-pane fade show active" id="tab1">
            <div class="card p-4">
                <h4>📚 布本借用/歸還</h4>
                <form id="form1">
                    <input type="hidden" name="type" value="布本借用">
                    <div class="mb-3"><label class="form-label">布本編號/品牌</label><input type="text" name="code" class="form-control" required placeholder="如：A01-歐式"></div>
                    <div class="mb-3"><label class="form-label">經手人</label><input type="text" name="user" class="form-control" required placeholder="店員姓名"></div>
                    <div class="mb-3">
                        <label class="form-label">動作</label>
                        <select name="action" class="form-select"><option value="借出">借出</option><option value="歸還">歸還</option></select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">提交變動</button>
                </form>
            </div>
        </div>

        <div class="tab-pane fade" id="tab2">
    <div class="card p-4">
        <h4>📊 來客統計回報</h4>
        <form id="form2">
            <input type="hidden" name="type" value="來客統計">
            
            <div class="row g-2 mb-3">
                <div class="col-6"><label class="form-label">門市來客</label><input type="number" name="walkin" class="form-control" value="0"></div>
                <div class="col-6"><label class="form-label">電話洽詢</label><input type="number" name="phone" class="form-control" value="0"></div>
                <div class="col-6"><label class="form-label">官網/粉專</label><input type="number" name="web" class="form-control" value="0"></div>
                <div class="col-6"><label class="form-label">門市LINE@</label><input type="number" name="line" class="form-control" value="0"></div>
                <div class="col-6"><label class="form-label">自洽客戶</label><input type="number" name="self" class="form-control" value="0"></div>
                <div class="col-6"><label class="form-label">其他</label><input type="number" name="other" class="form-control" value="0"></div>
            </div>
            
            <hr>

            <div class="row g-2 mb-3">
                <div class="col-6"><label class="form-label">當日諮詢數</label><input type="number" name="consults" class="form-control" value="0"></div>
                <div class="col-6"><label class="form-label">當日成交數</label><input type="number" name="deals" class="form-control" value="0"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">現場人員</label>
                <input type="text" name="staff" class="form-control" required placeholder="請輸入姓名">
            </div>
            
            <div class="mb-3">
                <label class="form-label">備註</label>
                <textarea name="note" class="form-control" rows="2" placeholder="如有特殊狀況請註記於此"></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">上傳當日統計</button>
        </form>
    </div>
</div>

        <div class="tab-pane fade" id="tab3">
            <div class="card p-4">
                <h4>⚠️ 問題回報系統</h4>
                <form id="form3">
                    <input type="hidden" name="type" value="問題回報">
                    <div class="mb-3">
                        <label class="form-label">問題類型</label>
                        <select name="issueType" class="form-select">
                            <option>銷售</option><option>丈量</option><option>安裝</option><option>售後</option><option>其他</option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label">敘述</label><textarea name="desc" class="form-control" rows="3"></textarea></div>
                    <button type="submit" class="btn btn-danger w-100">送出回報</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw7RcoGCiihnUSR2WeMaYS6Y77RLzBblIR5bFPLDztwrIp51dI72UQ93MKdw9numRpY/exec'; // 這裡填入你的 Google Apps Script 網址

    document.querySelectorAll('form').forEach(form => {
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = '傳送中...';

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert('資料已同步成功！');
                    btn.disabled = false;
                    btn.innerText = '提交變動';
                    form.reset();
                })
                .catch(error => alert('出錯了！請檢查網路'));
        });
    });
</script>
</body>
</html>
